<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4 mb-4">
            <h2 class="text-center mb-4">Inventory Label Reader</h2>
            <form id="uploadForm" action="/process" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="file" class="form-label">Upload Label Image (JPG)</label>
                    <input class="form-control" type="file" id="file" name="file" accept=".jpg,.jpeg" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Process Image</button>
                </div>
            </form>
            
            <div id="loading" class="text-center mt-4 loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Analyzing labels... this may take a few seconds.</p>
            </div>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        {% if results %}
        <div class="card p-4">
            <h4 class="mb-3">Extracted Inventory</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Item</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for entry in results %}
                        <tr>
                            <td>{{ entry.item }}</td>
                            <td>{{ entry.date }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = function() {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
        };
    </script>
</body>
</html>
